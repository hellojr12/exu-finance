[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.tokenizer",
  "php83Extensions.xml",
  "php83Extensions.ctype",
  "php83Extensions.bcmath",
  "php83Extensions.curl",
  "php83Extensions.fileinfo",
  "php83Extensions.zip",
  "php83Extensions.gd",
  "php83Extensions.openssl",
  "php83Extensions.dom",
  "php83Extensions.intl",
  "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
